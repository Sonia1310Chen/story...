<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="livrscene" style="display:none; position:relative; width:600px;">
        <img id="livingroom" src="livingroom.jpeg" alt="客廳照片" style="width:800px">
    
        <div id="tvpoint"
             onclick="showMessage1()"
             style="
                position:absolute;
                top:190px;
                left:335px;
                width:20px;
                height:20px;
                background:rgb(226, 71, 71);
                border-radius:50%;
                cursor:pointer;
             ">
        </div>
        <div id="tvmessage"
             style="
                display:none;
                position:absolute;
                top:230px;
                left:300px;
                background:white;
                padding:5px;
                border:1px solid black;
             ">
             開機了?!這麼老舊的電器居然還有功能啊
        </div>
        <div id="remotepoint"
             onclick="showMessage2()"
             style="
                position:absolute;
                top:250px;
                left:335px;
                width:20px;
                height:20px;
                background:rgb(226, 71, 71);
                border-radius:50%;
                cursor:pointer;
             ">
        </div>
        <div id="remotemessage"
             style="
                display:none;
                position:absolute;
                top:230px;
                left:300px;
                background:white;
                padding:5px;
                border:1px solid black;
             ">
            用它來操控電視吧
        </div>
        <div id="clockpoint"
             onclick="showMessage3()"
             style="
                position:absolute;
                top:120px;
                left:565px;
                width:20px;
                height:20px;
                background:rgb(226, 71, 71);
                border-radius:50%;
                cursor:pointer;
             ">
        </div>
        <div id="clockmessage"
             style="
                display:none;
                position:absolute;
                top:230px;
                left:300px;
                background:white;
                padding:5px;
                border:1px solid black;
             ">
             看來是個傳統的布穀鳥鐘，雖然很喜歡這種古老的工藝，但我還是第一次親眼看到布穀鳥鐘呢！據我所知在特定的時間布穀鳥會從小木門出來報時，這個鐘也是嗎？

        </div>
        <div id="boxpoint"
             onclick="showMessage4()"
             style="
                position:absolute;
                top:255px;
                left:705px;
                width:20px;
                height:20px;
                background:rgb(226, 71, 71);
                border-radius:50%;
                cursor:pointer;
             ">
        </div>
        <div id="boxmessage"
             style="
                display:none;
                position:absolute;
                top:260px;
                left:620px;
                background:white;
                padding:5px;
                border:1px solid black;
             ">
            嗯?看來需要知道密碼才能打開
        </div>
    </div>
    
    <img id="kitchen" src="kitchen.jpeg" alt="廚房照片" style="display: none;width:800px">
    
    
    <div id="game-container">
        <div id="status-bar">
            <span>目前位置：<span id="location">偵探事務所</span></span><br>
            <span>背包：<span id="inventory-list">無</span></span>
        </div>

        <div id="scene">
            <div id="narration">旁白：點擊下方對話開始故事...</div>
            <div id="character-display"></div>
        </div>

        <div id="dialogue-box">
            <h3 id="speaker-name">偵探</h3>
            <p id="dialogue-text">我是一個偵探，但我與其他小說裡的偵探做的事不同...</p>
            <button id="next-btn">下一步</button><br><br>
        </div>
        <div id="interaction-zone" class="hidden">
            <button onclick="collectItem('舊照片')">撿起 [舊照片]</button>
            <button onclick="collectItem('生鏽的鑰匙')">撿起 [生鏽的鑰匙]</button><br><br>
        </div>
        <div id="status-bar">
            <span>目前位置：<span id="location">奶奶家</span></span><br><br>
        </div>
        <div id="interaction-zone" class="hidden">
            <button onclick="collectItem('老電視')">撿起 [老電視]</button>
            <button onclick="collectItem('時鐘')">抬頭看看時鐘 [時鐘]</button>
            <button onclick="collectItem('遙控器')">撿起 [遙控器]</button>
            <button onclick="collectItem('餐桌')">查看 [餐桌]</button>
            <button onclick="collectItem('桌上小木盒')">撿起 [桌上小木盒]</button>
            <button onclick="collectItem('不知名餅乾桶')">撿起 [不知名餅乾桶]</button>
        </div>
    <script src="script.js"></script>
</body>

    <script src="./script.js"></script>
  </body>
</html>
